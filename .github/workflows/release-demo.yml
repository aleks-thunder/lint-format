name: Demo semantic-release dry run

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package_dir:
          - packages/base
          - packages/angular
          - packages/react

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@lavinmedia"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: semantic-release dry run
        working-directory: ${{ matrix.package_dir }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node ../../node_modules/semantic-release/bin/semantic-release.js --dry-run
