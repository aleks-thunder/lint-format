name: Validate PR title

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited
      - synchronize

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-slim
    permissions:
      pull-requests: read
    steps:
      - name: Validate conventional format with clear message
        shell: bash
        # will notify the user with a error message if the PR title does not follow the conventional commits format
        run: |
          title="${{ github.event.pull_request.title }}"
          pattern='^(feat|fix|breaking)(\([a-z0-9._/-]+\))?(!)?: .+$'
          if [[ ! "$title" =~ $pattern ]]; then
            echo "::error title=Invalid PR title::Use Conventional Commits format: type(scope): subject (space after ':' is required). Example: fix(base): test bad commit release"
            exit 1
          fi

      - uses: amannn/action-semantic-pull-request@v5
        with:
          types: |
            feat
            fix
            breaking
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
